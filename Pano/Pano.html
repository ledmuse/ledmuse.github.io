<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Kullanım Kılavuzları</title>
  <style>
    :root { 
      --bg:#0a0f1a; 
      --muted:#95a4c7; 
      --text:#e9f0fb; 
      --ok:#22c55e; 
      --radius:18px; 
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; 
      font-family: sans-serif; 
      color: var(--text);
      background:
        radial-gradient(1000px 700px at -10% -20%, #162445 0%, transparent 60%),
        radial-gradient(900px 600px at 120% 0%, #1b2747 0%, transparent 55%),
        var(--bg);
      background-repeat: no-repeat;
      min-height: 100svh;
    }
    .wrap { max-width: 1100px; margin: 0 auto; padding: 24px; }
    h1.page-title { text-align: center; font-size: clamp(28px, 6vw, 60px); font-weight: 800; margin: 0 0 24px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 14px; }
    .card {
      position: relative; 
      background: rgba(17, 24, 38, .6); 
      border: 1px solid #22314f; 
      border-radius: var(--radius);
      overflow: hidden; 
      transition: .2s;
    }
    .card:hover { transform: translateY(-4px); box-shadow: 0 8px 30px rgba(0,0,0,.4); }
    .cover { height: 200px; background: #22314f; display: flex; align-items: center; justify-content: center; position: relative; }
    .cover img { width: 100%; height: 100%; object-fit: cover; }
    .body { padding: 12px 14px; }
    .title { margin: 0; font-size: 16px; min-height: 40px; display: flex; align-items: center; }
    .desc { margin: 6px 0 0; color: var(--muted); font-size: 13px; }
    .link { position: absolute; inset: 0; z-index: 1; }
    
    .title-wrap {
      position: relative;
      display: flex; 
      align-items: center; 
      gap: 8px; 
      justify-content: space-between;
      z-index: 2;
    }
    .copy-btn {
      background-color: #1A7ECA;
      border: none;
      color: #fff;
      cursor: pointer;
      font-size: 14px;
      padding: 6px 10px;
      border-radius: 6px;
      transition: all .2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .copy-btn:hover { background-color: #1669a7; transform: scale(1.1); }
  </style>
</head>
<body>

  <div class="wrap">
    <h1 class="page-title">Kullanım Kılavuzları</h1>
    <div id="grid" class="grid"></div>
  </div>

  <template id="cardTemplate">
    <article class="card">
      <div class="cover"></div>
      <div class="body">
        <div class="title-wrap">
          <h3 class="title"></h3>
          <button class="copy-btn" type="button" title="Linki kopyala">
            <img src="copy.png" alt="Kopyala" width="18" height="18">
          </button>
        </div>
        <p class="desc">Kılavuzu görüntülemek için tıklayın.</p>
      </div>
      <a class="link" target="_self"></a>
    </article>
  </template>

  <script>
    const PROJECTS = [
      {
        slug: "s-bioklimatik-pano",
        title: "S Bioklimatik Pano",
        image: "s-bioklimatik-pano/s-bioklimatik-pano.jpg",
      },
      {
        slug: "cuppon-bioklimatik-pano",
        title: "Cuppon Bioklimatik Pano",
        image: "cuppon-bioklimatik-pano/cuppon-bioklimatik-pano.jpg",
      },
      {
        slug: "s-tilt-bioklimatik-pano",
        title: "S Tilt Bioklimatik Pano",
        image: "s-tilt-bioklimatik-pano/s-tilt-bioklimatik-pano.jpg",
      },
      {
        slug: "cuppon-tilt-pano",
        title: "Cuppon Tilt Pano",
        image: "cuppon-tilt-pano/cuppon-tilt-pano.png",
      }
    ];

    const grid = document.getElementById('grid');
    const template = document.getElementById('cardTemplate');

    function makeCard(p) {
      const card = template.content.cloneNode(true).firstElementChild;
      
      // Link Yapısı: /klasor/klasor.html (İsteğe bağlı değiştirebilirsin)
      const href = `/${p.slug}/${p.slug}.html`;
      card.querySelector('.link').href = href;
      card.querySelector('.title').textContent = p.title;

      // Kopyalama İşlemi
      const copyBtn = card.querySelector('.copy-btn');
      copyBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        e.preventDefault();
        const absoluteUrl = window.location.origin + href;
        navigator.clipboard.writeText(absoluteUrl).then(() => {
          const originalContent = copyBtn.innerHTML;
          copyBtn.textContent = "✅";
          setTimeout(() => copyBtn.innerHTML = originalContent, 1500);
        });
      });

      // Görsel Yükleme
      if(p.image) {
        const img = new Image();
        img.src = p.image;
        img.alt = p.title;
        img.loading = 'lazy';
        card.querySelector('.cover').appendChild(img);
      }

      return card;
    }

    function init() {
      grid.innerHTML = '';
      PROJECTS.forEach(p => grid.appendChild(makeCard(p)));
    }
    
    init();
  </script>

</body>
</html>
